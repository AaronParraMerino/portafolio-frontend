<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfil Navbar - S.P.A.R.K.Y</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── BÁSICO Y VARIABLES DE TU CÓDIGO ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-font-smoothing: antialiased; }

:root {
  --azul:        #0077b7;
  --azul-hover:  #005f95;
  --azul-light:  #e8f4fb;
  --azul-mid:    #b8ddf0;
  --azul-deep:   #004f7c;

  --fondo:       #f0ede8;
  --blanco:      #ffffff;
  --gris-borde:  #d1d5db;
  --gris-texto:  #6b7280;
  --gris-oscuro: #374151;
  --negro-texto: #111827;

  --rojo-mid:    #c94040;
  --rojo-bg:     rgba(232,85,85,.08);

  --green:       #10b981;
  --font:        'Inter', sans-serif;
  --mono:        'IBM Plex Mono', monospace;
}

body {
  font-family: var(--font);
  font-size: 15px;
  color: var(--negro-texto);
  background: var(--fondo);
  min-height: 100vh;
}

/* ── NAVBAR TOP (Tu mismo diseño exacto) ── */
nav {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 350;
  height: 60px;
  display: flex; align-items: center;
  padding: 0 40px;
  background: linear-gradient(90deg, var(--azul-deep) 0%, var(--azul) 100%);
  border-bottom: 3px solid rgba(255,255,255,.12);
  box-shadow: 0 2px 18px rgba(0,77,124,.25);
}

.nav-right { display: flex; align-items: center; gap: 8px; margin-left: auto; }

/* ── EL PERFIL DE USUARIO ── */
.nav-user {
  display: flex; align-items: center; gap: 9px;
  padding: 5px 10px 5px 5px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,.15);
  cursor: pointer;
  position: relative;
  transition: all .15s;
  user-select: none;
}
.nav-user:hover { background: rgba(255,255,255,.1); }
.nav-user.open { background: rgba(255,255,255,.12); }

.nav-avatar {
  width: 30px; height: 30px; border-radius: 50%;
  background: linear-gradient(135deg, var(--azul-mid), var(--blanco));
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700;
  color: var(--azul-deep); flex-shrink: 0;
  border: 1.5px solid rgba(255,255,255,.3);
}
.nav-user-info { line-height: 1.2; }
.nav-user-name {
  font-size: 12px; font-weight: 600; color: rgba(255,255,255,.9);
}
.nav-user-role {
  font-size: 10px; color: rgba(255,255,255,.38);
  font-family: var(--mono); letter-spacing: .04em;
}
.nav-chevron {
  width: 12px; height: 12px;
  stroke: rgba(255,255,255,.45); fill: none; stroke-width: 2;
  transition: transform .2s;
}
.nav-user.open .nav-chevron { transform: rotate(180deg); }

/* ── DROPDOWN DEL PERFIL ── */
.user-dropdown {
  position: absolute; top: calc(100% + 8px); right: 0;
  width: 220px;
  background: var(--blanco);
  border: 1.5px solid var(--gris-borde);
  border-radius: 10px;
  box-shadow: 0 12px 36px rgba(0,0,0,.14);
  opacity: 0; pointer-events: none;
  transform: translateY(-6px);
  transition: opacity .18s, transform .18s;
  z-index: 350;
}
.nav-user.open .user-dropdown { opacity: 1; pointer-events: all; transform: translateY(0); }

.dd-header {
  padding: 14px 16px 12px;
  border-bottom: 1px solid #f0ede8;
  display: flex; align-items: center; gap: 10px;
}
.dd-avatar {
  width: 38px; height: 38px; border-radius: 50%;
  background: linear-gradient(135deg, var(--azul-light), var(--azul-mid));
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; color: var(--azul-deep);
  border: 2px solid var(--azul-mid); flex-shrink: 0;
}
.dd-name { font-size: 13px; font-weight: 600; color: var(--negro-texto); }
.dd-email { font-size: 11px; color: var(--gris-texto); margin-top: 1px; }
.dd-status {
  font-size: 10px; color: var(--green);
  display: flex; align-items: center; gap: 4px; margin-top: 3px;
}
.dd-status-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); }

.dd-section { padding: 6px 8px; border-bottom: 1px solid #f0ede8; }
.dd-section:last-child { border-bottom: none; }
.dd-label {
  font-size: 10px; font-weight: 600; color: var(--gris-borde);
  text-transform: uppercase; letter-spacing: .08em;
  padding: 4px 8px 2px;
}

.dd-item {
  display: flex; align-items: center; gap: 9px;
  padding: 7px 8px; border-radius: 6px;
  font-size: 13px; color: var(--gris-oscuro);
  cursor: pointer; transition: all .12s; text-decoration: none;
}
.dd-item:hover { background: var(--fondo); color: var(--negro-texto); }
.dd-item svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.8; flex-shrink: 0; }
.dd-item.highlight {
  color: var(--azul); font-weight: 600;
}
.dd-item.highlight:hover { background: var(--azul-light); }
.dd-item.highlight svg { stroke: var(--azul); }
.dd-item.danger { color: var(--rojo-mid); }
.dd-item.danger:hover { background: var(--rojo-bg); }
.dd-item.danger svg { stroke: var(--rojo-mid); }

.dd-badge {
  margin-left: auto; font-size: 10px; font-weight: 600;
  padding: 1px 6px; border-radius: 10px;
  background: var(--azul-light); color: var(--azul);
}
</style>
</head>
<body>

<nav>
  <div class="nav-right">
    <div class="nav-user" id="nav-user">
      <div class="nav-avatar">AP</div>
      <div class="nav-user-info">
        <div class="nav-user-name">Aaron Parra Merino</div>
        <div class="nav-user-role">ADMIN / DEV</div>
      </div>
      <svg class="nav-chevron" viewBox="0 0 14 14"><path d="m3 5 4 4 4-4"/></svg>

      <div class="user-dropdown" id="user-dropdown" onclick="event.stopPropagation()">
        <div class="dd-header">
          <div class="dd-avatar">AP</div>
          <div>
            <div class="dd-name">Aaron Parra Merino</div>
            <div class="dd-email">aaron@sparky.dev</div>
            <div class="dd-status"><span class="dd-status-dot"></span>Perfil activo</div>
          </div>
        </div>
        
        <div class="dd-section">
          <div class="dd-label">Mi cuenta</div>
          <a class="dd-item">
            <svg viewBox="0 0 14 14"><circle cx="7" cy="5" r="3"/><path d="M1 13c0-3 2.7-5 6-5s6 2 6 5"/></svg>
            Ver mi perfil
          </a>
          <a class="dd-item">
            <svg viewBox="0 0 14 14"><circle cx="7" cy="7" r="2"/><path d="M7 1v1.5M7 11.5V13M1 7h1.5M11.5 7H13M2.9 2.9l1 1M10.1 10.1l1 1M2.9 11.1l1-1M10.1 3.9l1-1"/></svg>
            Configuración <span class="dd-badge">2</span>
          </a>
        </div>

        <div class="dd-section">
          <div class="dd-label">Portafolio</div>
          <a class="dd-item highlight">
            <svg viewBox="0 0 14 14"><rect x="2" y="3" width="10" height="9" rx="1.5"/><path d="M5 3V2M9 3V2M2 6h10"/></svg>
            Gestionar portafolio <span class="dd-badge">4</span>
          </a>
        </div>

        <div class="dd-section">
          <a class="dd-item danger">
            <svg viewBox="0 0 14 14"><path d="M10 1L13 4 10 7M13 4H5c-2 0-4 1-4 3v6"/></svg>
            Cerrar sesión
          </a>
        </div>
      </div>
    </div>
  </div>
</nav>

<script>
  // Tu script original para el funcionamiento del menú desplegable
  const navUser = document.getElementById('nav-user');
  
  navUser.addEventListener('click', (e) => {
    e.stopPropagation();
    navUser.classList.toggle('open');
  });

  document.addEventListener('click', () => {
    navUser.classList.remove('open');
  });
</script>

</body>
</html>
